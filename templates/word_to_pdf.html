<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to PDF - FileMorph</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head><body><div class="converter-container">

    <a href="/" class="back-btn">← Home</a>

    <h1 class="page-title">
        📄 Word → PDF Converter
    </h1>

    <p class="page-subtitle">
        Upload your DOC or DOCX file and convert it into PDF instantly.
    </p>

    <div class="upload-card">

        <form
            action="/convert-word-to-pdf"
            method="POST"
            enctype="multipart/form-data"
        >

            <div class="drop-area">

                <h2>Drag & Drop File Here</h2>

                <p>or select a Word document</p>

                <input
                    type="file"
                    name="file"
                    accept=".doc,.docx"
                    required
                >

            </div>

            <button
                type="submit"
                class="convert-btn"
            >
                Convert to PDF
            </button>

        </form>

    </div>

    <div class="info-box">

        <h3>Supported Formats</h3>

        <ul>
            <li>✓ .doc</li>
            <li>✓ .docx</li>
        </ul>

    </div>

</div>

</body>
</html>
